<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>トリッカル装備周回メモ</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="app-header">
    <div>
      <h1>トリッカル装備周回メモ</h1>
      <p>装備在庫と設計図の所持数から、不足素材と周回先の比率を確認します。</p>
    </div>
    <div class="header-actions">
      <button id="settingsButton" type="button">設定</button>
    </div>
  </header>

  <dialog class="settings-dialog" id="settingsDialog">
    <form method="dialog" class="settings-panel">
      <div class="settings-head">
        <h2>設定</h2>
        <button id="settingsCloseButton" type="submit" class="ghost-button">閉じる</button>
      </div>
      <div class="settings-list">
        <div class="field">
          <label for="inputModeSelect">数値入力方式</label>
          <select id="inputModeSelect">
            <option value="direct">直接入力</option>
            <option value="roll">ロール選択</option>
          </select>
        </div>
        <div class="field">
          <label for="autoCalculateSelect">自動計算</label>
          <select id="autoCalculateSelect">
            <option value="on">オン</option>
            <option value="off">オフ</option>
          </select>
        </div>
        <button id="exportButton" type="button">エクスポート</button>
        <label class="file-button">
          インポート
          <input id="importInput" type="file" accept="application/json">
        </label>
      </div>
    </form>
  </dialog>

  <dialog class="network-dialog" id="networkDialog">
    <div class="network-dialog-content">
      <div class="network-dialog-head">
        <div>
          <h2>探索ネットワーク</h2>
          <p>不足素材、候補ステージ、採用された組み合わせと評価値を確認します。</p>
        </div>
        <button id="networkCloseButton" type="button" class="ghost-button">閉じる</button>
      </div>
      <div class="network-toolbar">
        <label>
          <span>素材グループ</span>
          <select id="networkGroupSelect"></select>
        </label>
      </div>
      <div class="network-workspace">
        <div id="networkGraph" class="network-graph"></div>
        <div class="network-side-tools">
          <div class="network-view-actions" aria-label="ネットワーク表示操作">
            <button id="networkZoomOutButton" type="button" class="ghost-button" aria-label="縮小" title="縮小">−</button>
            <button id="networkZoomInButton" type="button" class="ghost-button" aria-label="拡大" title="拡大">＋</button>
            <button id="networkResetViewButton" type="button" class="ghost-button">全体表示</button>
            <button id="networkResetLayoutButton" type="button" class="ghost-button">配置を戻す</button>
          </div>
          <div class="network-info-strip">
            <div id="networkStoneSummary" class="network-stone-summary" aria-live="polite"></div>
            <details class="network-legend">
              <summary>説明</summary>
              <div class="network-legend-body" aria-label="ネットワーク凡例">
                <span><i class="legend-node is-primary"></i>対象素材</span>
                <span><i class="legend-node"></i>関連素材</span>
                <span><i class="legend-node is-off-build"></i>現在の型では対象外</span>
                <span><i class="legend-line is-selected"></i>採用</span>
                <span><i class="legend-line is-manual"></i>手動選択</span>
                <span><i class="legend-line"></i>候補</span>
                <span><i class="legend-line is-double"></i>同素材2枠</span>
              </div>
            </details>
          </div>
        </div>
        <div class="network-selection-actions" aria-label="手動選択操作">
          <button id="networkUseAdoptedButton" type="button" class="ghost-button">採用を選択</button>
          <button id="networkRestoreSelectionButton" type="button" class="ghost-button">保存済みに戻す</button>
          <button id="networkSaveSelectionButton" type="button">選択を保存</button>
        </div>
        <div id="networkDetails" class="network-details"></div>
      </div>
      <div id="networkMaterialEditor" class="network-material-editor" hidden>
        <div class="network-material-editor-head">
          <img id="networkMaterialEditorImage" src="" alt="">
          <div>
            <strong id="networkMaterialEditorTitle"></strong>
            <span id="networkMaterialEditorCurrent"></span>
          </div>
        </div>
        <label>
          <span>所持数</span>
          <span id="networkMaterialEditorControl"></span>
        </label>
        <div class="network-material-editor-actions">
          <button id="networkMaterialEditorCancel" type="button" class="ghost-button">キャンセル</button>
          <button id="networkMaterialEditorMax" type="button" class="ghost-button">Max</button>
          <button id="networkMaterialEditorSave" type="button">反映</button>
        </div>
      </div>
    </div>
  </dialog>

  <main class="layout">
    <section class="band controls-band">
      <div class="field">
        <label for="rankSelect">目標Rank</label>
        <select id="rankSelect"></select>
      </div>
      <div class="field">
        <label for="buildSelect">型</label>
        <select id="buildSelect">
          <option value="physical">物理</option>
          <option value="magic">魔法</option>
        </select>
      </div>
      <button id="resetButton" type="button" class="ghost-button">入力を初期化</button>
      <button id="consumeEquipmentButton" type="button" class="ghost-button">装備を消費</button>
    </section>

    <section class="planner-grid">
      <div class="equipment-panel">
        <h2>装備スロット</h2>
        <div class="equipment-tabs" role="tablist" aria-label="装備入力表示">
          <button type="button" class="equipment-tab is-active" data-equipment-tab="slots">スロット入力</button>
          <button type="button" class="equipment-tab" data-equipment-tab="inventory">設計図一覧</button>
        </div>
        <div id="equipmentSlotsPanel" class="equipment-tab-panel">
          <div class="equipment-grid" id="equipmentGrid"></div>
        </div>
        <div id="materialInventoryPanel" class="equipment-tab-panel is-hidden">
          <div class="material-inventory" id="materialInventory"></div>
        </div>
      </div>

      <div class="summary-panel">
        <div class="summary-head">
          <h2>サマリー</h2>
          <div class="summary-actions">
            <button id="networkOpenButton" type="button" class="ghost-button">ネットワーク</button>
            <button id="calculateButton" type="button" class="ghost-button" hidden>計算</button>
          </div>
        </div>
        <div id="tomeSummary" class="tome-summary"></div>
        <div class="summary-tabs" role="tablist" aria-label="サマリー表示">
          <button type="button" class="summary-tab is-active" data-summary-tab="recommendations">おすすめ周回</button>
          <button type="button" class="summary-tab" data-summary-tab="shortages">不足まとめ</button>
        </div>
        <div id="recommendationsPanel" class="summary-tab-panel">
          <div id="recommendations" class="recommendations"></div>
        </div>
        <div id="shortagesPanel" class="summary-tab-panel is-hidden">
          <div id="shortageSummary" class="shortage-summary"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="./data/equipment-data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
